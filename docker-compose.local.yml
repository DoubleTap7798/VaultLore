version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vaultlore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vaultlore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vaultlore-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vaultlore"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: vaultlore-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - vaultlore-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  vaultlore-postgres-data:
  vaultlore-redis-data:
